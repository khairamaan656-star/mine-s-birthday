<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(
135deg,
#ff9a9e,
#fad0c4,
#fbc2eb,
#a18cd1
);

min-height:100vh;
overflow-x:hidden;

}

.header{

text-align:center;
padding:40px 20px;

}

.avatar{

width:390px;
height:390px;

border-radius:50%;

border:6px solid white;

object-fit:cover;

box-shadow:0 0 30px rgba(255,255,255,.5);

animation:float 3s infinite ease-in-out;

}

@keyframes float{

50%{
transform:translateY(-15px);
}

}

.header h1{

margin-top:20px;
color:white;
font-size:3rem;

}

.gallery{

width:90%;
max-width:1300px;

margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

padding:30px;

}

.card{

background:rgba(255,255,255,.15);

backdrop-filter:blur(10px);

border-radius:20px;

overflow:hidden;

cursor:pointer;

transition:.4s;

animation:fadeUp 1s;

}

.card:hover{

transform:translateY(-10px)
scale(1.03);

}

.card img{

width:100%;
height:300px;

object-fit:cover;

}

.card p{

padding:15px;

color:white;

font-size:18px;

text-align:center;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.9);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

.overlay img{

max-width:90%;
max-height:90%;

border-radius:20px;

}

.next{

display:block;

margin:40px auto;

padding:15px 40px;

border:none;

border-radius:40px;

background:#ff4081;

color:white;

font-size:18px;

cursor:pointer;

}

.heart{

position:fixed;

pointer-events:none;

animation:floatHeart linear infinite;

}

@keyframes floatHeart{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

audio{

display:block;

margin:20px auto;

width:300px;

}

</style>

</head>

<body>

<div class="header">

<img
src="avtar2.jpeg"
class="avatar">

<h1>Our Beautiful Memories ❤️</h1>

<audio id="bgMusic" autoplay loop>
    <source src="tere te tere te.mpeg" type="audio/mpeg">
</audio>

</div>

<div class="gallery">

<div class="card">
<img
src="sweet moment.jpeg"
onclick="openImage(this.src)">
<p>Special Moment ❤️</p>
</div>

<div class="card">
<img
src="mine.jpeg"
onclick="openImage(this.src)">
<p>Beautiful Smile ❤️</p>
</div>

<div class="card">
<img
src="first pic.jpeg"
onclick="openImage(this.src)">
<p>Forever Memory(apni first picture) ❤️</p>
</div>

<div class="card">
<img
src="my fav.jpeg"
onclick="openImage(this.src)">
<p>My Favourite Photo ❤️</p>
</div>

<div class="card">
<img
src="pheli mulakaat.jpeg"
onclick="openImage(this.src)">
<p>Unforgettable Day (jdo me thonu pheli var miln aaye se )❤️</p>
</div>

<div class="card">
<img
src="cuttiee.jpeg"
onclick="openImage(this.src)">
<p>Pure Happiness ❤️</p>
</div>

</div>

<button
class="next"
onclick="nextPage()">

Timeline ❤️

</button>

<div
class="overlay"
id="overlay"
onclick="closeImage()">

<img
id="popupImage">

</div>

<script>
   const bgMusic = document.getElementById("bgMusic");

window.addEventListener("load", () => {
    bgMusic.currentTime = 10;
    bgMusic.play();
});
function openImage(src){

document.getElementById("overlay")
.style.display="flex";

document.getElementById("popupImage")
.src=src;

}

function closeImage(){

document.getElementById("overlay")
.style.display="none";

}

function nextPage(){

window.location.href=
"timeline.html";

}

for(let i=0;i<60;i++){

let heart=
document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=
Math.random()*100+"vw";

heart.style.fontSize=
(15+Math.random()*20)+"px";

heart.style.animationDuration=
(5+Math.random()*10)+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
